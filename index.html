<!DOCTYPE html>
<html>
<head>
    <title>Minimalist Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: white; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; }
        .my-msg { align-self: flex-end; background: #0088cc; color: white; }
        .other-msg { align-self: flex-start; background: #e4e6eb; color: black; }
        .video-circle { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid #0088cc; }
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; border: none; background: #f0f2f5; padding: 10px; border-radius: 20px; outline: none; }
        button { background: none; border: none; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button onclick="sendVoice()">🎤</button>
            <button onclick="sendVideo()">📷</button>
            <button onclick="send()">➡️</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const input = document.getElementById('msgInput');
        
        function send() {
            if(input.value) {
                socket.emit('message', { content: input.value, type: 'text' });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const div = document.createElement('div');
            div.className = `msg ${data.userId === socket.id ? 'my-msg' : 'other-msg'}`;
            
            if(data.type === 'text') {
                div.textContent = data.content;
            } else if(data.type === 'video') {
                div.innerHTML = `<video src="${data.content}" class="video-circle" autoplay loop muted></video>`;
            }
            
            document.getElementById('messages').appendChild(div);
        });

        // Заглушка для видео-кружка (логика записи)
        async function sendVideo() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            // Здесь будет логика MediaRecorder для записи кружка
            alert("Камера готова. В Codespaces нужно разрешить доступ!");
        }
    </script>
</body>
</html>
